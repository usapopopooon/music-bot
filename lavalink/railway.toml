[build]
builder = "dockerfile"
# Path is relative to this railway.toml's directory (= the lavalink service's
# Root Directory on Railway, which must be set to `/lavalink`).
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Healthcheck is intentionally disabled. Railway's private-networking
# port-detection does not reliably reach Lavalink on 2333, and Lavalink's
# `/v4/*` endpoints all require an Authorization header that Railway's
# healthcheck cannot send. The bot does its own HTTP preflight against
# Lavalink at startup (SPEC §7.5: 5x retry then exit), so deployment
# correctness is gated bot-side rather than via Railway's check.
