# Lavalink v4 config. SPEC §3.1, §7.8.5.

server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    # NOTE: youtube-plugin must track YouTube's frequent player.js changes.
    # When you see `IllegalStateException: Must find action functions from
    # script ... base.js`, bump this version to whatever release is current at
    # https://github.com/lavalink-devs/youtube-source/releases.
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.lavalink.dev/releases"
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "${LAVALINK_SERVER_PASSWORD}"
    sources:
      youtube: false   # core source disabled; youtube-source plugin handles it
      bandcamp: false  # SPEC §3.1.2
      soundcloud: true
      twitch: false    # SPEC §3.1.2
      vimeo: false     # SPEC §3.1.2
      http: false      # SPEC §3.1.2
      local: false     # SPEC §3.1.2
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 1000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: false
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: true
      # Deezer requires an `arl` cookie since LavaSrc 4.8. We don't ship one, so
      # leave it off. To enable: get an arl from a logged-in Deezer browser
      # session, set DEEZER_ARL env var on the lavalink service, and add
      #   plugins.lavasrc.deezer.arl: "${DEEZER_ARL}"
      # below.
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: false   # delegated to youtube-source
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "JP"
    applemusic:
      countryCode: "JP"
      mediaAPIToken: "${APPLE_MUSIC_TOKEN:}"
    # deezer:
    #   arl: "${DEEZER_ARL}"          # required by LavaSrc 4.8+
    #   masterDecryptionKey: "..."    # optional, see LavaSrc README
    searchLimit: 10

  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - WEB
      - WEBEMBEDDED
      - ANDROID_VR
      - ANDROID_MUSIC
      - TVHTML5EMBEDDED

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: false
  logback:
    rollingpolicy:
      max-file-size: 25MB
      max-history: 7

metrics:
  prometheus:
    enabled: false
