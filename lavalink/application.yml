# Lavalink v4 config. SPEC §3.1, §7.8.5.

server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    # NOTE: youtube-plugin must track YouTube's frequent player.js changes.
    # When you see `IllegalStateException: Must find action functions from
    # script ... base.js`, bump this version to whatever release is current at
    # https://github.com/lavalink-devs/youtube-source/releases.
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.8.1"
      repository: "https://maven.lavalink.dev/releases"
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
  server:
    password: "${LAVALINK_SERVER_PASSWORD}"
    sources:
      youtube: false   # core source disabled; youtube-source plugin handles it
      bandcamp: false  # SPEC §3.1.2
      soundcloud: true
      twitch: false    # SPEC §3.1.2
      vimeo: false     # SPEC §3.1.2
      http: false      # SPEC §3.1.2
      local: false     # SPEC §3.1.2
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 1000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: false
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: true
      # Deezer requires an `arl` cookie since LavaSrc 4.8. We don't ship one, so
      # leave it off. To enable: get an arl from a logged-in Deezer browser
      # session, set DEEZER_ARL env var on the lavalink service, and add
      #   plugins.lavasrc.deezer.arl: "${DEEZER_ARL}"
      # below.
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: false   # delegated to youtube-source
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "JP"
    applemusic:
      countryCode: "JP"
      mediaAPIToken: "${APPLE_MUSIC_TOKEN:}"
    # deezer:
    #   arl: "${DEEZER_ARL}"          # required by LavaSrc 4.8+
    #   masterDecryptionKey: "..."    # optional, see LavaSrc README
    searchLimit: 10

  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # Proof-of-Origin Token. Required since YouTube tightened anonymous access in
    # 2026-Q2 — without it WEB/WEBEMBEDDED return "This video requires login".
    # Generate a (token, visitorData) pair with
    #   https://github.com/iv-org/youtube-trusted-session-generator
    # then set both as env vars on the Lavalink service. Tokens rotate; if playback
    # starts failing again, regenerate.
    pot:
      token: "${YT_PO_TOKEN:}"
      visitorData: "${YT_VISITOR_DATA:}"
    clients:
      # Order: highest playback quality first, with each line being a fallback
      # for the previous one. See youtube-source README for the client matrix.
      #
      # Tier 1 — Opus + PoToken (the most reliable since 2026-Q2's login wall;
      # PoToken only applies to these two clients).
      - WEB
      - WEBEMBEDDED
      # Tier 2 — Opus, anonymous, full features (Video / Search / Playlist /
      # Mix + Livestream).
      - ANDROID_VR
      - MWEB
      - TVHTML5_SIMPLY
      # Tier 3 — Opus, anonymous, narrower (no Livestream / Playlist).
      - ANDROID_MUSIC
      # Tier 4 — last-resort layers with known issues.
      - ANDROID         # "heavily restricted, frequently dysfunctional"
      - IOS             # no Opus -> playback needs transcoding
      # Excluded:
      #   TV     — requires OAuth refresh token; we don't ship one.
      #   MUSIC  — search-only client; current `lavasrc.providers` use
      #            `ytsearch:` (not `ytmsearch:`), so MUSIC is never invoked.
      #            Add it back if you also add `ytmsearch:` to providers.

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: false
  logback:
    rollingpolicy:
      max-file-size: 25MB
      max-history: 7

metrics:
  prometheus:
    enabled: false
